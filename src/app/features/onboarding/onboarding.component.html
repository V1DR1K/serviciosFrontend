<main class="onboarding"><section class="card"><div class="progress"><i [class.done]="step()>=1"></i><i [class.done]="step()>=2"></i><i [class.done]="step()>=3"></i></div>@if(step()===1){<h1>Bienvenido a ServiCerca</h1><p>Completá tu perfil para cuidar a toda la comunidad.</p><div class="photo"><span class="material-symbols-outlined">photo_camera</span></div><form [formGroup]="form"><div class="grid"><label>Nombre completo<input formControlName="fullName" placeholder="Ej: Juan Pérez"></label><label>DNI<input formControlName="dni" placeholder="Sin puntos"></label><label>Teléfono<input formControlName="phone" placeholder="+54 9..."></label><label>Ciudad o localidad<input formControlName="locality" placeholder="Ej: Córdoba"></label></div><label class="check"><input type="checkbox" formControlName="professionalEnabled">También quiero ofrecer servicios</label></form><button class="primary wide" (click)="next()">Continuar</button>}@if(step()===2){<button class="back" (click)="step.set(1)">← Volver</button><h1>¿A qué te dedicás?</h1><div class="trades">@for(t of trades();track t.id){<button [class.selected]="selected.has(t.id)" (click)="toggle(t.id)"><span class="material-symbols-outlined">{{t.icon}}</span>{{t.name}}</button>}</div><button class="primary wide" (click)="save()">Completar perfil</button>}@if(step()===3){<div class="success"><span class="material-symbols-outlined">verified</span><h1>¡Ya sos parte!</h1><button class="primary" (click)="router.navigate(['/app/dashboard'])">Ir al inicio</button></div>}@if(error()){<p class="error">{{error()}}</p>}</section></main>
