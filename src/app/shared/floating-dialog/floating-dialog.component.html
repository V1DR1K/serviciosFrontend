<div class="dialog-backdrop" (click)="cancelled.emit()"><section class="dialog" role="dialog" aria-modal="true" [attr.aria-label]="title" (click)="$event.stopPropagation()"><button class="dialog-close" type="button" aria-label="Cerrar" (click)="cancelled.emit()">×</button><div class="dialog-icon" [class]="tone"><span class="material-symbols-outlined">{{tone==='danger'?'warning':tone==='success'?'check_circle':'help'}}</span></div><h2>{{title}}</h2>@if(message){<p>{{message}}</p>}<ng-content></ng-content><footer><button class="secondary" type="button" [disabled]="busy" (click)="cancelled.emit()">{{cancelText}}</button><button class="confirm" [class]="tone" type="button" [disabled]="busy" (click)="confirmed.emit()">{{busy?'Guardando…':confirmText}}</button></footer></section></div>
