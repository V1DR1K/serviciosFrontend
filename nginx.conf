server { listen 8080; server_name _; root /usr/share/nginx/html; index index.html;
 location /api/ { proxy_pass http://backend:8080; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
 location /ws/ { proxy_pass http://backend:8080; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }
 location / { try_files $uri $uri/ /index.html; }
 add_header X-Frame-Options DENY always; add_header X-Content-Type-Options nosniff always;
}
