name: Containers
on: {workflow_dispatch: {inputs: {tag: {description: Image tag, required: true, default: latest}}}}
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: {username: "${{ secrets.DOCKERHUB_USERNAME }}", password: "${{ secrets.DOCKERHUB_TOKEN }}"}
      - uses: docker/build-push-action@v6
        with: {context: ., push: true, tags: "${{ secrets.DOCKERHUB_USERNAME }}/servicerca-frontend:${{ inputs.tag }}"}
